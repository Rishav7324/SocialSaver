# fly.toml app configuration file generated for socialsaver on 2026-07-07T14:48:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'socialsaver'
primary_region = 'lhr'

[build]

[[mounts]]
  source = 'smed_data'
  destination = '/app/downloads'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
